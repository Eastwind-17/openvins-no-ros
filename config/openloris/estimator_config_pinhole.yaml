%YAML:1.0 # need to specify the file type at the top!

verbosity: "INFO" # ALL, DEBUG, INFO, WARNING, ERROR, SILENT

filepath_traj: "/home/vector/code/open_vins/traj_pinhole.txt"

use_fej: true
integration: "rk4"
use_stereo: true
max_cameras: 2

calib_cam_extrinsics: true
calib_cam_intrinsics: true
calib_cam_timeoffset: true
calib_imu_intrinsics: false
calib_imu_g_sensitivity: false

max_clones: 11
max_slam: 50
max_slam_in_update: 25
max_msckf_in_update: 40
dt_slam_delay: 1

gravity_mag: 9.81

feat_rep_msckf: "GLOBAL_3D"
feat_rep_slam: "ANCHORED_MSCKF_INVERSE_DEPTH"
feat_rep_aruco: "ANCHORED_MSCKF_INVERSE_DEPTH"

# zero velocity update
try_zupt: false
zupt_chi2_multipler: 0
zupt_max_velocity: 0.1
zupt_noise_multiplier: 10
zupt_max_disparity: 0.5
zupt_only_at_beginning: false

# initialization
init_window_time: 1.0
init_imu_thresh: 0.5
init_max_disparity: 10.0
init_max_features: 50

init_dyn_use: true
init_dyn_mle_opt_calib: false
init_dyn_mle_max_iter: 50
init_dyn_mle_max_time: 0.1
init_dyn_mle_max_threads: 6
init_dyn_num_pose: 6
init_dyn_min_deg: 0.0

init_dyn_inflation_ori: 10
init_dyn_inflation_vel: 100
init_dyn_inflation_bg: 10
init_dyn_inflation_ba: 100
init_dyn_min_rec_cond: 1e-12

init_dyn_bias_g: [ 0.0, 0.0, 0.0 ]
init_dyn_bias_a: [ 0.0, 0.0, 0.0 ]

# timing and recording
record_timing_information: true
record_timing_filepath: "/tmp/openloris_pinhole_timing.txt"

save_total_state: true
filepath_est: "/tmp/openloris_pinhole_estimate.txt"
filepath_std: "/tmp/openloris_pinhole_estimate_std.txt"
filepath_gt: "/tmp/openloris_pinhole_groundtruth.txt"

# feature tracking - Pinhole stereo cameras
use_klt: true
num_pts: 200
fast_threshold: 20
grid_x: 8
grid_y: 5
min_px_dist: 15
knn_ratio: 0.70
track_frequency: 20.0  # Adjust based on your camera fps
downsample_cameras: false
num_opencv_threads: 4
histogram_method: "HISTOGRAM"

# aruco
use_aruco: false
num_aruco: 1024
downsize_aruco: true

# camera noises
up_msckf_sigma_px: 1
up_msckf_chi2_multipler: 1
up_slam_sigma_px: 1
up_slam_chi2_multipler: 1
up_aruco_sigma_px: 1
up_aruco_chi2_multipler: 1

# masks for pinhole cameras (disabled by default)
use_mask: false
# mask0: "mask_pinhole_cam0.png"
# mask1: "mask_pinhole_cam1.png"

# imu and camera config files for pinhole
relative_config_imu: "kalibr_imu_chain_pinhole.yaml"
relative_config_imucam: "kalibr_imucam_chain_pinhole.yaml"

# OpenLORIS dataset camera and IMU names (for rectified pinhole cameras)
openloris_imu_prefix: "t265"
openloris_cam0_name: "fisheye1_rect"
openloris_cam1_name: "fisheye2_rect"

# Frame range control (index starts from 0)
start_frame: 0      # Start processing from this frame index
end_frame: -1       # End processing at this frame index (-1 means process until the end)
